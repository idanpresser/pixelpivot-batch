name: CI

# Locks in the dual-dialect guarantee (bd-cpo.1 / E10.1): the full pytest suite
# runs on every push and pull request against BOTH sqlite (the default path)
# and postgres (via PIXELPIVOT_DB_URL). A dialect regression fails the build.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: pytest (${{ matrix.dialect }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        dialect: [sqlite, postgres]

    services:
      # Always started; only the postgres matrix leg points PIXELPIVOT_DB_URL at
      # it. Mirrors the docker-compose `test-postgres` service (postgres:16).
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pixelpivot
          POSTGRES_PASSWORD: pixelpivot
          POSTGRES_DB: pixelpivot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pixelpivot -d pixelpivot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install native libraries
        # pyvips binds to libvips; the headless opencv/pillow-heif wheels bundle
        # the rest. Smoke tests needing magick/ffmpeg/sharp auto-skip when absent.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libvips42

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install project (dev + postgres extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Run test suite
        env:
          # Empty on the sqlite leg → connection.py falls back to the sqlite
          # file path. Set on the postgres leg → the whole suite runs on pg.
          PIXELPIVOT_DB_URL: ${{ matrix.dialect == 'postgres' && 'postgresql+psycopg://pixelpivot:pixelpivot@localhost:5432/pixelpivot_test' || '' }}
        run: |
          pytest tests/ -q
