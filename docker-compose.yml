version: '3.8'

services:
  # Persistent PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: pixelpivot_postgres
    environment:
      POSTGRES_USER: pixelpivot
      POSTGRES_PASSWORD: pixelpivot
      POSTGRES_DB: pixelpivot
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelpivot -d pixelpivot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Headless FastAPI Engine
  pixelpivot-batch-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixelpivot_batch_api
    command: ["uvicorn", "app.batch_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
      - /app/services/sharp-daemon/node_modules        # preserve image contents over the host mount
      - ./test_examples:/app/test_examples
      - ./out:/app/out
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - IS_DOCKER=true
      - PIXELPIVOT_DB_URL=postgresql://pixelpivot:pixelpivot@postgres:5432/pixelpivot
      - PIXELPIVOT_ALLOW_PUBLIC=1
      - PIXELPIVOT_API_TOKEN=${PIXELPIVOT_API_TOKEN:-}

  # Standalone Batch GUI
  pixelpivot-batch-gui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixelpivot_batch_gui
    command: ["python", "-m", "streamlit", "run", "app/web/batch_gui/main.py", "--server.port=8503"]
    ports:
      - "127.0.0.1:8503:8503"
    environment:
      - BATCH_API_URL=http://pixelpivot-batch-api:8000/api/v1
      - PIXELPIVOT_API_TOKEN=${PIXELPIVOT_API_TOKEN:-}
    depends_on:
      pixelpivot-batch-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8503/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # CLI Access / Test Runner
  pixelpivot-cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixelpivot_cli
    command: ["tail", "-f", "/dev/null"]   # keep alive
    volumes:
      - .:/app
      - /app/services/sharp-daemon/node_modules
    environment:
      - IS_DOCKER=true
      - PIXELPIVOT_DB_URL=postgresql://pixelpivot:pixelpivot@postgres:5432/pixelpivot
      - PIXELPIVOT_API_TOKEN=${PIXELPIVOT_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      pixelpivot-batch-api:
        condition: service_healthy

volumes:
  postgres_data:
